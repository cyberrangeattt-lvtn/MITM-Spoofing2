name: mitm-Spoofing2

hosts:
  - name: attacker
    base_box:
      image: kali
      mgmt_user: debian
    flavor: standard.kali

  - name: server
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small

  - name: client
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small

routers:
  - name: router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
    flavor: standard.small

wan:
  name: internet-connection
  cidr: 100.100.100.0/24

networks:
  - name: lan-switch
    cidr: 10.1.26.0/24
  #   accessible_by_user: False
  # - name: attacker-switch
  #   cidr: 10.1.27.0/24

net_mappings:
  - host: attacker
    network: lan-switch
    ip: 10.1.26.50

  - host: server
    network: lan-switch
    ip: 10.1.26.10

  - host: client
    network: lan-switch
    ip: 10.1.26.20

router_mappings:
  - router: router
    network: lan-switch
    ip: 10.1.26.1
  # - router: router
  #   network: attacker-switch
  #   ip: 10.1.27.1

groups: []
